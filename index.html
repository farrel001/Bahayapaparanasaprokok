<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Mode</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    height: 100vh;
    background: radial-gradient(circle, #1a001a, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
}

/* Card */
.card {
    position: relative;
    text-align: center;
    z-index: 2;
}

.card img {
    width: 260px;
    border-radius: 20px;
    border: 4px solid pink;
    box-shadow: 0 0 30px pink;
}

.text {
    margin-top: 10px;
    color: white;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 0 0 10px pink, 0 0 20px red;
}

/* Love animation */
.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: pink;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: pink;
    border-radius: 50%;
}

.heart::before {
    top: -10px;
    left: 0;
}

.heart::after {
    left: -10px;
    top: 0;
}

@keyframes float {
    0% {
        transform: translateY(100vh) rotate(45deg);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh) rotate(45deg);
        opacity: 0;
    }
}
</style>
</head>
<body>

<div class="card">
    <img src="https://image2url.com/r2/default/images/1773989756777-bb1ab90b-438a-4b41-b3be-52814108bfa3.jpg">
    <div class="text">SeLaMAT HAri VaLeNtain cayank💕💕💕💕💕</div>
</div>

<script>
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 200);
</script>

</body>
</html>
