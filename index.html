<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NIKE SHOP • Official Store</title>
    <!-- Font & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fa;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .app-container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 36px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: background 0.3s;
        }

        .main-content {
            padding: 20px 18px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #000000, #555555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-size: 0.9rem;
            background: #111;
            color: white;
            padding: 2px 8px;
            border-radius: 40px;
            margin-left: 4px;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
        }

        .cart-icon svg {
            width: 28px;
            height: 28px;
            fill: #333;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Balance & Theme Row */
        .row-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .balance-chip {
            background: #eef2f6;
            padding: 8px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #0b1e4b;
        }

        .balance-chip svg {
            width: 20px;
            height: 20px;
            fill: #f5b342;
        }

        .theme-row {
            display: flex;
            gap: 8px;
        }

        .theme-btn {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: 0.2s;
        }

        .theme-btn.active {
            background: #000;
            color: white;
            border-color: #000;
        }

        /* Search Bar */
        .search-box {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .search-box svg {
            width: 18px;
            fill: #64748b;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            outline: none;
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 20px;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-item {
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
        }

        .category-item.active {
            background: #000;
            color: white;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .product-card {
            background: white;
            border: 1px solid #eef2f6;
            border-radius: 24px;
            padding: 16px 12px;
            transition: 0.2s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.04);
            border-color: #ccc;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1/1;
            background: #f8fafc;
            border-radius: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .product-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .product-category {
            font-size: 0.7rem;
            color: #64748b;
            margin-bottom: 8px;
        }

        .product-price {
            font-weight: 700;
            color: #000;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 12px;
        }

        .product-price svg {
            width: 14px;
            fill: #f5b342;
        }

        .add-to-cart {
            background: #000;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 0;
            width: 100%;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .add-to-cart:hover {
            background: #333;
        }

        .add-to-cart:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Cart Section */
        .cart-section {
            background: #f8fafc;
            border-radius: 28px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .cart-header h3 {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .clear-cart {
            color: #ef4444;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .cart-items {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .cart-item-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .cart-item-price {
            font-size: 0.8rem;
            color: #64748b;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            border: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 600;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 16px;
            padding-top: 10px;
            border-top: 2px dashed #cbd5e1;
        }

        .checkout-btn {
            background: #000;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }

        .checkout-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Redeem Code */
        .redeem-card {
            background: white;
            border-radius: 28px;
            padding: 16px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .redeem-card input {
            flex: 2;
            min-width: 160px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 12px 16px;
            font-size: 0.9rem;
        }

        .redeem-btn {
            flex: 1;
            background: #000;
            border: none;
            border-radius: 40px;
            padding: 12px 10px;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
        }

        .redeem-btn svg {
            width: 16px;
            fill: white;
        }

        .redeem-message {
            font-size: 0.8rem;
            color: #475569;
            width: 100%;
            text-align: center;
        }

        /* Result Message */
        .result-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #334155;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 60px;
            margin-top: 16px;
        }

        /* Reset Data */
        .reset-data {
            text-align: center;
            margin-top: 16px;
            font-size: 0.75rem;
            color: #94a3b8;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <div class="logo">
                    <h1>NIKE <span>SHOP</span></h1>
                </div>
                <div class="cart-icon" id="cartIcon">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 6h15l-1.5 9h-12L6 6zm0 0L4.5 3H2" stroke="currentColor" stroke-width="1.5" fill="none"/>
                        <circle cx="9" cy="20" r="2" fill="currentColor"/>
                        <circle cx="18" cy="20" r="2" fill="currentColor"/>
                    </svg>
                    <span class="cart-badge" id="cartCount">0</span>
                </div>
            </div>

            <!-- Balance & Theme -->
            <div class="row-flex">
                <div class="balance-chip">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M6 12h12M12 6v12" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                    <span id="balanceDisplay">100.000</span>
                </div>
                <div class="theme-row">
                    <div class="theme-btn active" data-theme="light">Light</div>
                    <div class="theme-btn" data-theme="dark">Dark</div>
                </div>
            </div>

            <!-- Search -->
            <div class="search-box">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/>
                    <path d="M16 16l4 4" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Cari sepatu Nike...">
            </div>

            <!-- Categories -->
            <div class="categories" id="categoryContainer">
                <div class="category-item active" data-cat="all">Semua</div>
                <div class="category-item" data-cat="running">Running</div>
                <div class="category-item" data-cat="basketball">Basketball</div>
                <div class="category-item" data-cat="lifestyle">Lifestyle</div>
                <div class="category-item" data-cat="soccer">Soccer</div>
            </div>

            <!-- Product Grid -->
            <div class="product-grid" id="productGrid"></div>

            <!-- Cart Section -->
            <div class="cart-section" id="cartSection">
                <div class="cart-header">
                    <h3>
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M6 6h15l-1.5 9h-12L6 6zm0 0L4.5 3H2" stroke="currentColor" stroke-width="1.5" fill="none"/>
                        </svg>
                        Keranjang
                    </h3>
                    <span class="clear-cart" id="clearCart">Hapus semua</span>
                </div>
                <div class="cart-items" id="cartItems"></div>
                <div class="cart-total">
                    <span>Total</span>
                    <span id="cartTotal">Rp 0</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn" disabled>Checkout</button>
            </div>

            <!-- Redeem Code -->
            <div class="redeem-card">
                <input type="text" id="redeemCodeInput" placeholder="Kode promo" value="NIKE10">
                <button class="redeem-btn" id="redeemBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 6L9 17l-5-5" stroke="white" stroke-width="2" fill="none"/>
                    </svg>
                    Redeem
                </button>
                <div class="redeem-message" id="redeemMessage"></div>
            </div>

            <!-- Result Message -->
            <div class="result-line" id="resultMessage">
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
                    <text x="7" y="18" font-size="12" fill="currentColor">i</text>
                </svg>
                <span id="resultText">Siap belanja</span>
            </div>

            <!-- Reset Data -->
            <div class="reset-data" id="resetData">↻ Reset data</div>
        </div>
    </div>

    <script>
        (function() {
            // ===== STORAGE KEYS =====
            const STORAGE_KEYS = {
                BALANCE: 'nike_balance',
                CART: 'nike_cart',
                REDEEM_CODES: 'nike_redeemCodes'
            };

            // ===== DATA PRODUK NIKE =====
            const products = [
                { id: 1, name: "Nike Air Max 90", category: "lifestyle", price: 1899000, image: "👟" },
                { id: 2, name: "Nike Revolution 6", category: "running", price: 849000, image: "🏃" },
                { id: 3, name: "Nike Air Zoom Pegasus 39", category: "running", price: 2199000, image: "⚡" },
                { id: 4, name: "Nike Air Jordan 1 Low", category: "basketball", price: 2499000, image: "🏀" },
                { id: 5, name: "Nike Air Force 1 '07", category: "lifestyle", price: 1799000, image: "👟" },
                { id: 6, name: "Nike Phantom GT2", category: "soccer", price: 1899000, image: "⚽" },
                { id: 7, name: "Nike LeBron 20", category: "basketball", price: 3499000, image: "👑" },
                { id: 8, name: "Nike Mercurial Vapor 15", category: "soccer", price: 2799000, image: "🔥" },
                { id: 9, name: "Nike Air Max 97", category: "lifestyle", price: 2499000, image: "✨" },
                { id: 10, name: "Nike Free Run 5.0", category: "running", price: 1299000, image: "🌊" },
                { id: 11, name: "Nike Kyrie 8", category: "basketball", price: 1999000, image: "🔮" },
                { id: 12, name: "Nike Tiempo Legend 9", category: "soccer", price: 1699000, image: "🥅" }
            ];

            // ===== STATE =====
            let balance = 100000;
            let cart = []; // { id, name, price, quantity }
            let currentCategory = 'all';
            let searchTerm = '';

            // Redeem codes default
            let redeemCodes = {
                "NIKE10": 10000,
                "RUNNING50": 50000,
                "JORDAN25": 25000,
                "FREESHIP": 15000
            };

            // ===== LOAD DATA =====
            function loadData() {
                // Load balance
                const savedBalance = localStorage.getItem(STORAGE_KEYS.BALANCE);
                if (savedBalance !== null) {
                    balance = parseInt(savedBalance) || 100000;
                }

                // Load cart
                const savedCart = localStorage.getItem(STORAGE_KEYS.CART);
                if (savedCart !== null) {
                    try {
                        cart = JSON.parse(savedCart);
                    } catch (e) {
                        cart = [];
                    }
                }

                // Load redeem codes
                const savedCodes = localStorage.getItem(STORAGE_KEYS.REDEEM_CODES);
                if (savedCodes) {
                    try {
                        const parsed = JSON.parse(savedCodes);
                        redeemCodes = { ...redeemCodes, ...parsed };
                    } catch (e) {}
                }
            }

            // ===== SAVE DATA =====
            function saveBalance() {
                localStorage.setItem(STORAGE_KEYS.BALANCE, balance.toString());
            }

            function saveCart() {
                localStorage.setItem(STORAGE_KEYS.CART, JSON.stringify(cart));
            }

            function saveRedeemCodes() {
                localStorage.setItem(STORAGE_KEYS.REDEEM_CODES, JSON.stringify(redeemCodes));
            }

            // ===== UI ELEMENTS =====
            const balanceEl = document.getElementById('balanceDisplay');
            const cartCountEl = document.getElementById('cartCount');
            const productGrid = document.getElementById('productGrid');
            const cartItemsEl = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            const checkoutBtn = document.getElementById('checkoutBtn');
            const clearCartBtn = document.getElementById('clearCart');
            const resultText = document.getElementById('resultText');
            const redeemInput = document.getElementById('redeemCodeInput');
            const redeemBtn = document.getElementById('redeemBtn');
            const redeemMsg = document.getElementById('redeemMessage');
            const searchInput = document.getElementById('searchInput');

            // ===== FUNCTIONS =====
            function formatRupiah(amount) {
                return 'Rp ' + amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
            }

            function updateBalanceUI() {
                balanceEl.textContent = formatRupiah(balance);
                saveBalance();
            }

            function updateCartCount() {
                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                cartCountEl.textContent = totalItems;
            }

            function calculateCartTotal() {
                return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            }

            function renderProducts() {
                let filtered = products;
                
                // Filter by category
                if (currentCategory !== 'all') {
                    filtered = filtered.filter(p => p.category === currentCategory);
                }
                
                // Filter by search
                if (searchTerm) {
                    filtered = filtered.filter(p => 
                        p.name.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                }

                if (filtered.length === 0) {
                    productGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 30px; color: #64748b;">Produk tidak ditemukan</div>';
                    return;
                }

                productGrid.innerHTML = filtered.map(product => {
                    const inCart = cart.find(item => item.id === product.id);
                    return `
                        <div class="product-card">
                            <div class="product-image">${product.image}</div>
                            <div class="product-title">${product.name}</div>
                            <div class="product-category">${product.category}</div>
                            <div class="product-price">
                                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/><text x="7" y="18" font-size="12" fill="currentColor">$</text></svg>
                                ${formatRupiah(product.price)}
                            </div>
                            <button class="add-to-cart" onclick="window.addToCart(${product.id})" ${inCart ? 'disabled' : ''}>
                                ${inCart ? '✓ Di keranjang' : 'Tambah ke keranjang'}
                            </button>
                        </div>
                    `;
                }).join('');
            }

            function renderCart() {
                if (cart.length === 0) {
                    cartItemsEl.innerHTML = '<div style="text-align: center; padding: 20px; color: #64748b;">Keranjang kosong</div>';
                    cartTotalEl.textContent = 'Rp 0';
                    checkoutBtn.disabled = true;
                    return;
                }

                cartItemsEl.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div>${item.image || '👟'}</div>
                            <div>
                                <div class="cart-item-name">${item.name}</div>
                                <div class="cart-item-price">${formatRupiah(item.price)}</div>
                            </div>
                        </div>
                        <div class="cart-item-qty">
                            <div class="qty-btn" onclick="window.updateQuantity(${item.id}, -1)">−</div>
                            <span>${item.quantity}</span>
                            <div class="qty-btn" onclick="window.updateQuantity(${item.id}, 1)">+</div>
                        </div>
                    </div>
                `).join('');

                const total = calculateCartTotal();
                cartTotalEl.textContent = formatRupiah(total);
                checkoutBtn.disabled = total > balance;
            }

            // ===== CART ACTIONS =====
            window.addToCart = function(productId) {
                const product = products.find(p => p.id === productId);
                if (!product) return;

                const existing = cart.find(item => item.id === productId);
                if (existing) {
                    existing.quantity += 1;
                } else {
                    cart.push({
                        id: product.id,
                        name: product.name,
                        price: product.price,
                        quantity: 1,
                        image: product.image
                    });
                }

                saveCart();
                updateCartCount();
                renderProducts();
                renderCart();
                resultText.innerHTML = `${product.name} ditambahkan ke keranjang`;
            };

            window.updateQuantity = function(productId, change) {
                const index = cart.findIndex(item => item.id === productId);
                if (index === -1) return;

                const item = cart[index];
                item.quantity += change;

                if (item.quantity <= 0) {
                    cart.splice(index, 1);
                    resultText.innerHTML = `${item.name} dihapus dari keranjang`;
                }

                saveCart();
                updateCartCount();
                renderProducts();
                renderCart();
            };

            // Checkout
            checkoutBtn.addEventListener('click', function() {
                const total = calculateCartTotal();
                if (total > balance) {
                    resultText.innerHTML = "Saldo tidak cukup!";
                    return;
                }

                balance -= total;
                cart = [];
                
                saveBalance();
                saveCart();
                updateBalanceUI();
                updateCartCount();
                renderProducts();
                renderCart();
                
                resultText.innerHTML = `✅ Checkout berhasil! Total ${formatRupiah(total)}`;
            });

            // Clear cart
            clearCartBtn.addEventListener('click', function() {
                if (cart.length === 0) return;
                cart = [];
                saveCart();
                updateCartCount();
                renderProducts();
                renderCart();
                resultText.innerHTML = "Keranjang dikosongkan";
            });

            // ===== CATEGORY & SEARCH =====
            document.querySelectorAll('.category-item').forEach(cat => {
                cat.addEventListener('click', function() {
                    document.querySelectorAll('.category-item').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.cat;
                    renderProducts();
                });
            });

            searchInput.addEventListener('input', function(e) {
                searchTerm = e.target.value;
                renderProducts();
            });

            // ===== REDEEM =====
            window.addRedeemCode = function(code, value) {
                redeemCodes[code.toUpperCase()] = value;
                saveRedeemCodes();
                console.log(`✅ Code ${code} added with value ${value}`);
            };

            redeemBtn.addEventListener('click', function() {
                let code = redeemInput.value.trim().toUpperCase();
                if (redeemCodes[code]) {
                    let bonus = redeemCodes[code];
                    balance += bonus;
                    updateBalanceUI();
                    redeemMsg.innerHTML = `✅ +${formatRupiah(bonus)} berhasil!`;
                    delete redeemCodes[code];
                    saveRedeemCodes();
                } else {
                    redeemMsg.innerHTML = "❌ Kode tidak valid";
                }
            });

            // ===== THEME =====
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    let theme = this.dataset.theme;
                    let container = document.querySelector('.app-container');
                    
                    if (theme === 'dark') {
                        container.style.background = '#1e293b';
                        container.style.color = 'white';
                    } else {
                        container.style.background = 'white';
                        container.style.color = '#1e293b';
                    }
                });
            });

            // ===== RESET DATA =====
            document.getElementById('resetData').addEventListener('click', function() {
                if (confirm('Reset semua data?')) {
                    localStorage.clear();
                    balance = 100000;
                    cart = [];
                    redeemCodes = {
                        "NIKE10": 10000,
                        "RUNNING50": 50000,
                        "JORDAN25": 25000,
                        "FREESHIP": 15000
                    };
                    
                    updateBalanceUI();
                    updateCartCount();
                    renderProducts();
                    renderCart();
                    resultText.innerHTML = "Data direset";
                }
            });

            // ===== INIT =====
            loadData();
            updateBalanceUI();
            updateCartCount();
            renderProducts();
            renderCart();
        })();
    </script>
</body>
    </html>
