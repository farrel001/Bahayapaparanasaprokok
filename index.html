<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON TRADER</title>
    <style>
        /* ===== RESET & DASAR ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0c0f15;
            font-family: 'Courier New', Courier, monospace;
            padding: 16px;
            transition: background 0.3s;
        }

        /* ===== THEME VARIABLES ===== */
        body.theme-cyberpunk {
            --bg-primary: #0d0f1c;
            --bg-secondary: #161b2b;
            --card-bg: #1f263b;
            --text-primary: #22ffff;
            --text-secondary: #ff44dd;
            --accent: #00eeff;
            --accent-secondary: #ff00aa;
            --border-glow: 0 0 10px #00ffff, 0 0 20px #ff00aa;
            --shadow: 0 0 30px #00aaff;
            --btn-bg: #242b44;
            --btn-hover: #323d66;
        }

        body.theme-tokyo {
            --bg-primary: #1e1a2e;
            --bg-secondary: #2a2347;
            --card-bg: #372f57;
            --text-primary: #ffb86b;
            --text-secondary: #ff7b9c;
            --accent: #ff9f4b;
            --accent-secondary: #ff577f;
            --border-glow: 0 0 15px #ff7b9c;
            --shadow: 0 0 30px #ff6b8b;
            --btn-bg: #40355f;
            --btn-hover: #55477a;
        }

        body.theme-gangster {
            --bg-primary: #1a120b;
            --bg-secondary: #2c1e12;
            --card-bg: #3e2c1b;
            --text-primary: #d4af37;
            --text-secondary: #b8860b;
            --accent: #c9a227;
            --accent-secondary: #8b5a2b;
            --border-glow: 0 0 15px #b8860b;
            --shadow: 0 0 30px #a0522d;
            --btn-bg: #4a3824;
            --btn-hover: #5e4830;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* ===== CONTAINER ===== */
        .game-container {
            max-width: 1100px;
            width: 100%;
            background: var(--bg-secondary);
            border: 2px solid var(--accent);
            border-radius: 40px;
            padding: 24px;
            box-shadow: var(--shadow), inset 0 0 40px rgba(0,255,255,0.1);
            backdrop-filter: blur(5px);
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
        }

        .title svg {
            width: 220px;
            height: 50px;
            filter: drop-shadow(var(--border-glow));
        }

        .balance-box {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            border-radius: 60px;
            padding: 12px 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
        }

        .balance-box svg {
            width: 28px;
            height: 28px;
            fill: var(--accent);
        }

        #balanceDisplay {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .theme-selector {
            display: flex;
            gap: 8px;
        }

        .theme-btn {
            background: var(--btn-bg);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .theme-btn:hover {
            background: var(--btn-hover);
            box-shadow: var(--shadow);
        }

        /* ===== CHART AREA (SVG GRAFIK) ===== */
        .chart-area {
            background: var(--bg-primary);
            border: 2px solid var(--accent);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 24px;
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,255,255,0.1);
        }

        .chart-svg {
            width: 100%;
            height: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            display: block;
        }

        .current-price {
            position: absolute;
            top: 30px;
            right: 40px;
            background: var(--card-bg);
            border: 1px solid var(--accent);
            border-radius: 60px;
            padding: 8px 24px;
            font-size: 2rem;
            font-weight: 800;
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .current-price svg {
            width: 30px;
            height: 30px;
            fill: var(--accent);
        }

        /* ===== TRADING PANEL ===== */
        .trading-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 24px;
        }

        .direction-buttons {
            flex: 2;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .direction-btn {
            flex: 1;
            background: var(--btn-bg);
            border: 3px solid var(--accent);
            border-radius: 50px;
            padding: 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .direction-btn svg {
            width: 60px;
            height: 60px;
            fill: var(--accent);
            transition: 0.2s;
        }

        .direction-btn:hover {
            background: var(--btn-hover);
            transform: scale(1.05);
            box-shadow: var(--shadow);
        }

        .direction-btn:hover svg {
            fill: var(--text-secondary);
        }

        .betting-controls {
            flex: 1;
            background: var(--card-bg);
            border: 2px solid var(--accent);
            border-radius: 40px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bet-input {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bet-input label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
        }

        .bet-input label svg {
            width: 20px;
            height: 20px;
            fill: var(--accent);
        }

        .bet-input input {
            background: var(--bg-primary);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 12px 16px;
            font-size: 1.2rem;
            border-radius: 30px;
            outline: none;
        }

        .multiplier-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
        }

        .multiplier-info svg {
            width: 24px;
            height: 24px;
            fill: var(--accent-secondary);
        }

        #placeBetBtn {
            background: var(--btn-bg);
            border: 2px solid var(--accent);
            color: var(--text-primary);
            padding: 15px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #placeBetBtn svg {
            width: 24px;
            height: 24px;
            fill: var(--accent);
        }

        #placeBetBtn:hover {
            background: var(--btn-hover);
            box-shadow: var(--shadow);
        }

        /* ===== SHOP SECTION ===== */
        .shop-section {
            border: 2px dashed var(--accent);
            border-radius: 40px;
            padding: 24px;
            margin-bottom: 24px;
            background: var(--card-bg);
        }

        .shop-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .shop-title svg {
            width: 32px;
            height: 32px;
            fill: var(--accent);
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
            border: 1px solid var(--accent);
            border-radius: 60px;
            padding: 16px 28px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .item-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .item-info svg {
            width: 40px;
            height: 40px;
            fill: var(--accent-secondary);
        }

        .item-desc strong {
            font-size: 1.3rem;
        }

        .item-price {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .item-price svg {
            width: 24px;
            height: 24px;
            fill: var(--accent);
        }

        .buy-btn {
            background: var(--btn-bg);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 10px 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .buy-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--accent);
        }

        .buy-btn:hover:not(:disabled) {
            background: var(--btn-hover);
            box-shadow: var(--shadow);
        }

        .buy-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .active-charm {
            margin-top: 20px;
            background: var(--bg-primary);
            border-radius: 60px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--accent);
            font-size: 1.2rem;
        }

        .active-charm svg {
            width: 28px;
            height: 28px;
            fill: var(--accent-secondary);
        }

        #charmTimer {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-secondary);
        }

        /* ===== REDEEM SECTION ===== */
        .redeem-section {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .redeem-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .redeem-left svg {
            width: 32px;
            height: 32px;
            fill: var(--accent-secondary);
        }

        .redeem-left input {
            background: var(--bg-primary);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 1rem;
            width: 200px;
        }

        .redeem-btn {
            background: var(--btn-bg);
            border: 2px solid var(--accent);
            color: var(--text-primary);
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .redeem-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--accent);
        }

        .redeem-btn:hover {
            background: var(--btn-hover);
            box-shadow: var(--shadow);
        }

        .redeem-history {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* ===== RESULT MESSAGE ===== */
        .result-message {
            text-align: center;
            padding: 18px;
            border-radius: 60px;
            background: var(--bg-primary);
            border: 1px solid var(--accent);
            margin-top: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .result-message svg {
            width: 28px;
            height: 28px;
            fill: var(--accent-secondary);
        }
    </style>
</head>
<body class="theme-cyberpunk">
    <div class="game-container">
        <!-- HEADER -->
        <div class="header">
            <div class="title">
                <svg viewBox="0 0 300 50">
                    <text x="10" y="35" fill="none" stroke="currentColor" stroke-width="2" font-size="32" font-weight="bold" letter-spacing="2">NEON TRADER</text>
                    <text x="10" y="35" fill="currentColor" font-size="32" font-weight="bold" letter-spacing="2">NEON TRADER</text>
                </svg>
            </div>
            <div class="balance-box">
                <svg viewBox="0 0 32 32">
                    <circle cx="16" cy="16" r="14" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M8 16 L24 16 M16 8 L16 24" stroke="currentColor" stroke-width="2"/>
                    <circle cx="16" cy="16" r="4" fill="currentColor"/>
                </svg>
                <span id="balanceDisplay">10000</span>
            </div>
            <div class="theme-selector">
                <div class="theme-btn" data-theme="cyberpunk">CYBER</div>
                <div class="theme-btn" data-theme="tokyo">TOKYO</div>
                <div class="theme-btn" data-theme="gangster">GANGSTER</div>
            </div>
        </div>

        <!-- CHART SVG -->
        <div class="chart-area">
            <svg class="chart-svg" viewBox="0 0 800 200" preserveAspectRatio="none">
                <polyline id="chartLine" points="0,150 100,120 200,170 300,90 400,140 500,60 600,110 700,40 800,80" 
                          fill="none" stroke="var(--accent)" stroke-width="3" vector-effect="non-scaling-stroke"/>
                <circle cx="800" cy="80" r="6" fill="var(--accent-secondary)" id="currentPoint"/>
            </svg>
            <div class="current-price">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2 L12 22 M5 12 L19 12" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="12" r="4" fill="currentColor"/>
                </svg>
                <span id="currentPriceLabel">100</span>
            </div>
        </div>

        <!-- TRADING PANEL -->
        <div class="trading-panel">
            <div class="direction-buttons">
                <div class="direction-btn" id="btnUp">
                    <svg viewBox="0 0 100 100">
                        <polygon points="50,10 90,80 10,80" fill="currentColor"/>
                    </svg>
                </div>
                <div class="direction-btn" id="btnDown">
                    <svg viewBox="0 0 100 100">
                        <polygon points="50,90 90,20 10,20" fill="currentColor"/>
                    </svg>
                </div>
            </div>
            <div class="betting-controls">
                <div class="bet-input">
                    <label>
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                            <path d="M12 6 L12 18 M6 12 L18 12" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        MODAL
                    </label>
                    <input type="number" id="betAmount" min="100" value="1000" step="100">
                </div>
                <div class="multiplier-info">
                    <span>
                        <svg viewBox="0 0 24 24">
                            <text x="2" y="20" font-size="20" fill="currentColor">2x</text>
                        </svg>
                        Pengganda:
                    </span>
                    <span id="multiplierDisplay">2x</span>
                </div>
                <button id="placeBetBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M5 12 L19 12 M12 5 L12 19" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    PASANG TARUHAN
                </button>
            </div>
        </div>

        <!-- SHOP JIMAT -->
        <div class="shop-section">
            <div class="shop-title">
                <svg viewBox="0 0 32 32">
                    <rect x="4" y="10" width="24" height="18" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M8 10 L8 4 L24 4 L24 10" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
                SHOP JIMAT • 1 MENIT
            </div>
            <div class="shop-item">
                <div class="item-info">
                    <svg viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="16" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M20 8 L20 32 M8 20 L32 20" stroke="currentColor" stroke-width="2"/>
                        <circle cx="20" cy="20" r="4" fill="currentColor"/>
                    </svg>
                    <div class="item-desc">
                        <strong>JIMAT KEBERUNTUNGAN</strong><br>
                        <small>Jika menang 3x lipat (aktif 60 detik)</small>
                    </div>
                </div>
                <div class="item-price">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                        <text x="8" y="18" font-size="12" fill="currentColor">5</text>
                    </svg>
                    5000
                </div>
                <button class="buy-btn" id="buyCharmBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M5 12 L19 12 M12 5 L12 19" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    BELI
                </button>
            </div>
            <div id="activeCharmDisplay" class="active-charm" style="display: none;">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M12 6 L12 12 L16 14" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
                <span>JIMAT AKTIF <span id="charmTimer">60</span>s</span>
            </div>
        </div>

        <!-- REDEEM CODE SYSTEM -->
        <div class="redeem-section">
            <div class="redeem-left">
                <svg viewBox="0 0 32 32">
                    <rect x="6" y="10" width="20" height="16" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M10 6 L10 12 M22 6 L22 12" stroke="currentColor" stroke-width="2"/>
                    <text x="8" y="28" font-size="12" fill="currentColor">$</text>
                </svg>
                <input type="text" id="redeemCodeInput" placeholder="MASUKKAN CODE" value="FREEBONUS">
                <button class="redeem-btn" id="redeemBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 6 L9 17 L4 12" stroke="currentColor" stroke-width="3" fill="none"/>
                    </svg>
                    REDEEM
                </button>
            </div>
            <div class="redeem-history">
                <span id="redeemMessage"></span>
            </div>
        </div>

        <!-- RESULT MESSAGE -->
        <div id="resultMessage" class="result-message">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                <text x="7" y="18" font-size="14" fill="currentColor">i</text>
            </svg>
            <span>SIAP MAIN</span>
        </div>
    </div>

    <script>
        (function() {
            // ----- STATE GAME -----
            let balance = 10000;
            let currentPrice = 100;
            let priceHistory = [150, 120, 170, 90, 140, 60, 110, 40, 80]; // seed awal
            let chartLine = document.getElementById('chartLine');
            let currentPoint = document.getElementById('currentPoint');
            let currentPriceLabel = document.getElementById('currentPriceLabel');
            let balanceDisplay = document.getElementById('balanceDisplay');
            let betAmountInput = document.getElementById('betAmount');
            let multiplierDisplay = document.getElementById('multiplierDisplay');
            let resultDiv = document.getElementById('resultMessage').querySelector('span');
            let placeBetBtn = document.getElementById('placeBetBtn');
            let btnUp = document.getElementById('btnUp');
            let btnDown = document.getElementById('btnDown');
            
            // Status taruhan
            let currentBet = null; // { direction, amount, priceAtBet }
            let betPending = false;
            
            // Jimat
            let charmActive = false;
            let charmEndTime = 0;
            let charmTimerInterval = null;
            let activeCharmDisplay = document.getElementById('activeCharmDisplay');
            let charmTimerSpan = document.getElementById('charmTimer');
            let buyCharmBtn = document.getElementById('buyCharmBtn');

            // Redeem codes
            let redeemCodes = {
                "FREEBONUS": 5000,
                "BONUS100": 10000,
                "JIMATGRATIS": 2000,
                "HOKI": 7500
            
            };

            // ----- FUNGSI UPDATE UI -----
            function updateBalance(amount) {
                balance = amount;
                balanceDisplay.textContent = balance;
            }

            // Update grafik SVG berdasarkan priceHistory
            function updateChart() {
                let points = "";
                let width = 800, height = 200;
                let step = width / (priceHistory.length - 1);
                
                // Normalize harga ke range 20-180 (biar keliatan di svg)
                let minPrice = Math.min(...priceHistory, 20);
                let maxPrice = Math.max(...priceHistory, 180);
                let range = maxPrice - minPrice || 1;
                
                for (let i = 0; i < priceHistory.length; i++) {
                    let x = i * step;
                    let y = height - 20 - ((priceHistory[i] - minPrice) / range) * (height - 60);
                    points += `${x},${y} `;
                }
                chartLine.setAttribute('points', points.trim());
                
                // update titik terakhir
                let lastX = (priceHistory.length - 1) * step;
                let lastY = height - 20 - ((priceHistory[priceHistory.length-1] - minPrice) / range) * (height - 60);
                currentPoint.setAttribute('cx', lastX);
                currentPoint.setAttribute('cy', lastY);
                
                currentPriceLabel.textContent = Math.floor(priceHistory[priceHistory.length-1]);
            }

            // Generate harga baru (random walk)
            function generateNewPrice() {
                let last = priceHistory[priceHistory.length-1];
                let change = (Math.random() * 10) - 4; // -4 .. +6 (cenderung naik sedikit biar seru)
                let newPrice = Math.max(10, last + change);
                priceHistory.push(newPrice);
                if (priceHistory.length > 10) priceHistory.shift();
                currentPrice = newPrice;
                updateChart();
                
                // Cek hasil taruhan jika ada yang pending
                if (betPending && currentBet) {
                    let result = null;
                    if (newPrice > currentBet.priceAtBet) result = 'up';
                    else if (newPrice < currentBet.priceAtBet) result = 'down';
                    
                    if (result) {
                        let win = (currentBet.direction === result);
                        let multiplier = charmActive ? 3 : 2;
                        
                        if (win) {
                            let winAmount = currentBet.amount * multiplier;
                            updateBalance(balance + winAmount);
                            resultDiv.innerHTML = `MENANG! +${winAmount}`;
                        } else {
                            resultDiv.innerHTML = `KALAH... -${currentBet.amount}`;
                            // saldo sudah dipotong saat pasang
                        }
                        
                        // Tampilkan panah
                        let arrow = result === 'up' ? '▲' : '▼';
                        resultDiv.innerHTML += ` ${arrow}`;
                        
                        betPending = false;
                        currentBet = null;
                        placeBetBtn.disabled = false;
                    }
                }
            }

            // Interval gerak harga
            setInterval(generateNewPrice, 1200);

            // ----- TARUHAN -----
            function placeBet(direction) {
                if (betPending) {
                    resultDiv.innerHTML = "TUNGGU TARUHAN SEBELUMNYA";
                    return;
                }
                
                let amount = parseInt(betAmountInput.value);
                if (isNaN(amount) || amount < 100) amount = 100;
                if (amount > balance) {
                    resultDiv.innerHTML = "SALDO TIDAK CUKUP";
                    return;
                }
                
                // potong saldo
                updateBalance(balance - amount);
                
                currentBet = {
                    direction: direction,
                    amount: amount,
                    priceAtBet: currentPrice
                };
                betPending = true;
                placeBetBtn.disabled = true;
                
                resultDiv.innerHTML = `TARUHAN ${direction === 'up' ? 'NAIK' : 'TURUN'} Rp${amount}...`;
            }

            btnUp.addEventListener('click', () => placeBet('up'));
            btnDown.addEventListener('click', () => placeBet('down'));

            // ----- JIMAT -----
            function buyCharm() {
                if (balance < 5000) {
                    resultDiv.innerHTML = "SALDO TIDAK CUKUP";
                    return;
                }
                if (charmActive) {
                    resultDiv.innerHTML = "JIMAT SUDAH AKTIF";
                    return;
                }
                
                updateBalance(balance - 5000);
                charmActive = true;
                charmEndTime = Date.now() + 60000; // 60 detik
                activeCharmDisplay.style.display = 'flex';
                multiplierDisplay.textContent = '3x';
                
                if (charmTimerInterval) clearInterval(charmTimerInterval);
                charmTimerInterval = setInterval(() => {
                    let remaining = Math.max(0, Math.ceil((charmEndTime - Date.now()) / 1000));
                    charmTimerSpan.textContent = remaining;
                    
                    if (remaining <= 0) {
                        charmActive = false;
                        activeCharmDisplay.style.display = 'none';
                        multiplierDisplay.textContent = '2x';
                        clearInterval(charmTimerInterval);
                    }
                }, 200);
            }
            buyCharmBtn.addEventListener('click', buyCharm);

            // ----- REDEEM CODE (bisa ditambah kapan saja via console atau dengan method) -----
            window.addRedeemCode = function(code, value) {
                redeemCodes[code.toUpperCase()] = value;
                console.log(`✅ Code ${code} ditambahkan dengan nilai ${value}`);
            };

            document.getElementById('redeemBtn').addEventListener('click', function() {
                let input = document.getElementById('redeemCodeInput').value.trim().toUpperCase();
                let msg = document.getElementById('redeemMessage');
                
                if (redeemCodes.hasOwnProperty(input)) {
                    let bonus = redeemCodes[input];
                    updateBalance(balance + bonus);
                    msg.innerHTML = `✅ REDEEM BERHASIL +${bonus}`;
                    // Hapus code setelah dipakai (opsional)
                    delete redeemCodes[input];
                } else {
                    msg.innerHTML = "❌ CODE TIDAK VALID";
                }
            });

            // ----- THEME SWITCHER -----
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    let theme = this.dataset.theme;
                    document.body.className = ''; // reset
                    document.body.classList.add(`theme-${theme}`);
                });
            });

            // ----- INITIAL RENDER -----
            updateBalance(balance);
            updateChart();
            multiplierDisplay.textContent = '2x';
            
            // Contoh cara nambah redeem code via console: 
            // addRedeemCode("RAHASIA", 25000)
        })();
    </script>
</body>
    </html>
