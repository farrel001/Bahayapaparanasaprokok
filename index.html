<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Test Web Security</title>
  <style>
    body { font-family: Arial; background:#111; color:#eee; text-align:center; }
    input, button { padding:10px; margin:5px; }
    .box { background:#222; padding:20px; margin:20px auto; width:300px; border-radius:10px; }
  </style>
</head>
<body>

<h1>🔐 Test Website (Vulnerable)</h1>

<div class="box">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <p id="loginResult"></p>
</div>

<div class="box">
  <h2>Komentar</h2>
  <input type="text" id="comment" placeholder="Tulis komentar"><br>
  <button onclick="postComment()">Post</button>
  <div id="comments"></div>
</div>

<script>
// LOGIN (SENGAJA LEMAH)
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  // Simulasi login (vulnerable logic)
  if (user == "admin" && pass == "1234") {
    document.getElementById("loginResult").innerHTML = "Login berhasil!";
  } else {
    document.getElementById("loginResult").innerHTML = "Login gagal!";
  }
}

// KOMENTAR (XSS VULNERABLE)
function postComment() {
  let comment = document.getElementById("comment").value;

  // SENGAJA TIDAK DI-SANITIZE
  document.getElementById("comments").innerHTML += "<p>" + comment + "</p>";
}
</script>

</body>
</html>
