<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paling Ganteng Sedunia</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #000, #1a1a1a);
        font-family: 'Arial', sans-serif;
    }

    .card {
        position: relative;
        padding: 15px;
        border-radius: 20px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        box-shadow: 0 0 30px rgba(255, 0, 120, 0.6);
        border: 2px solid rgba(255,255,255,0.1);
        text-align: center;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { box-shadow: 0 0 20px rgba(255,0,120,0.5); }
        to { box-shadow: 0 0 50px rgba(255,0,120,1); }
    }

    .card img {
        width: 260px;
        border-radius: 15px;
        border: 4px solid white;
    }

    .title {
        margin-top: 12px;
        font-size: 20px;
        font-weight: bold;
        color: #fff;
        text-shadow: 0 0 10px pink, 0 0 20px red;
    }

    .badge {
        position: absolute;
        top: -10px;
        right: -10px;
        background: pink;
        color: black;
        padding: 5px 10px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: bold;
        box-shadow: 0 0 10px pink;
    }
</style>

</head>
<body>

<div class="card">
    <div class="badge">PLAYBOY</div>

    <img src="https://image2url.com/r2/default/images/1773989756777-bb1ab90b-438a-4b41-b3be-52814108bfa3.jpg">

    <div class="title">
        PALING GANTENG SEDUNIA 😎🔥
    </div>
</div>

</body>
</html>
